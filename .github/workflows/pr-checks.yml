name: PR Checks

on:
  pull_request:
    branches: [main]

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: ruff check
        run: ruff check src/ tests/ --output-format=github

      - name: ruff format check
        run: ruff format src/ tests/ --check

  # ── Security ────────────────────────────────────────────────────────────────
  security:
    name: Security (bandit + safety)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bandit and safety
        run: pip install bandit safety

      - name: bandit — static security analysis (medium+ severity)
        run: bandit -r src/ -ll -q

      - name: safety — dependency vulnerability check
        run: safety check -r requirements.txt --ignore 70612
        continue-on-error: true

  # ── Test ────────────────────────────────────────────────────────────────────
  test:
    name: Test (Python 3.11)
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-3.11-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-3.11-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests with coverage
        id: pytest
        run: |
          pytest tests/ \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            -v 2>&1 | tee pytest-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          fail_ci_if_error: false

      - name: Build PR comment body
        id: comment-body
        if: always()
        run: |
          {
            echo 'body<<COMMENT_EOF'
            echo '## Test Summary'
            echo ''
            echo '```'
            tail -40 pytest-output.txt
            echo '```'
            echo ''
            echo "_Workflow run: [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})_"
            echo 'COMMENT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Post sticky PR comment
        if: always()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: test-summary
          message: ${{ steps.comment-body.outputs.body }}

  # ── Helm lint ───────────────────────────────────────────────────────────────
  helm-lint:
    name: Helm lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: helm lint
        run: helm lint infrastructure/helm/agi-system/

      - name: helm template
        run: >
          helm template agi-system infrastructure/helm/agi-system/
          --namespace agi-system
