# Default values for agi-system Helm chart.
# Override with: helm install agi-system ./infrastructure/helm/agi-system -f my-values.yaml

replicaCount: 1

image:
  repository: agi-system
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: false
  className: nginx
  host: agi.local
  tls: []

resources:
  requests:
    memory: "512Mi"
    cpu: "250m"
  limits:
    memory: "2Gi"
    cpu: "1000m"

env:
  LLM_PROVIDER: openai
  WEB_SEARCH_PROVIDER: mock
  PYTHONPATH: /app

secrets:
  # Set these via --set secrets.openaiApiKey=sk-...
  openaiApiKey: ""
  anthropicApiKey: ""
  webSearchApiKey: ""
  apiKey: ""

chromadb:
  enabled: true
  image: chromadb/chroma
  tag: latest
  service:
    port: 8000
  persistence:
    enabled: true
    size: 5Gi

redis:
  enabled: true
  image: redis
  tag: 7-alpine
  persistence:
    enabled: true
    size: 1Gi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
