apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  namespace: {{ .Release.Namespace }}
type: Opaque
data:
  openai-api-key: {{ .Values.secrets.openaiApiKey | b64enc | quote }}
  anthropic-api-key: {{ .Values.secrets.anthropicApiKey | b64enc | quote }}
  web-search-api-key: {{ .Values.secrets.webSearchApiKey | b64enc | quote }}
  api-key: {{ .Values.secrets.apiKey | b64enc | quote }}
